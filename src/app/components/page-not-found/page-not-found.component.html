<div class="error-page">

  <!-- BG CIRCLES -->
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>

  <div class="error-card">

    <!-- ICON -->
    <div class="error-icon-wrap">
      <div class="error-icon">
        <i class="pi pi-map"></i>
      </div>
      <div class="pulse-ring"></div>
    </div>

    <!-- CODE -->
    <div class="error-code">404</div>

    <!-- TEXT -->
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

    <!-- SUGGESTIONS -->
    <div class="info-strip">
      <div class="info-item">
        <i class="pi pi-search"></i>
        <span>Check the URL</span>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <i class="pi pi-home"></i>
        <span>Go to Home</span>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <i class="pi pi-shopping-bag"></i>
        <span>Browse Products</span>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="error-actions">
      <p-button label="Go to Home" icon="pi pi-home" severity="success" routerLink="/home" />
      <p-button label="Browse Products" icon="pi pi-shopping-bag" [outlined]="true" severity="success" routerLink="/products" />
    </div>

  </div>

</div>
