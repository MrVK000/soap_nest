<div class="wl-page">

  <!-- HEADER -->
  <div class="wl-header">
    <p-button label="Back" icon="pi pi-arrow-left" [text]="true" severity="secondary"
      (onClick)="sharedService.goBack()" />
    <div class="header-title">
      <i class="pi pi-bookmark-fill"></i>
      <span>My Wishlist</span>
      <span class="item-count" *ngIf="wishlist.length > 0">{{ wishlist.length }} item{{ wishlist.length > 1 ? 's' : ''
        }}</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="wl-container">

    <!-- EMPTY STATE -->
    <div class="empty-wl" *ngIf="!loading && wishlist.length === 0">
      <div class="empty-icon"><i class="pi pi-bookmark"></i></div>
      <h2>Your wishlist is empty</h2>
      <p>Save items you love and come back to them anytime.</p>
      <p-button label="Explore Products" icon="pi pi-arrow-right" iconPos="right" severity="success"
        routerLink="/products" />
    </div>

    <!-- GRID -->
    <div class="wl-grid" *ngIf="wishlist.length > 0">
      <div class="wl-card" *ngFor="let item of wishlist">

        <div class="card-image-wrap">
          <img [src]="item.image" [alt]="item.name" class="card-img" />
          <span class="offer-badge" *ngIf="+item.offer > 0">{{ item.offer }}% OFF</span>
          <p-button icon="pi pi-bookmark-fill" [text]="true" severity="danger" styleClass="remove-btn"
            title="Remove from wishlist" (onClick)="removeFromWishlist(item)" />
        </div>

        <div class="card-body">
          <h3 class="card-name">{{ item.name }}</h3>
          <p class="card-desc">{{ item.description }}</p>

          <div class="price-row">
            <span class="price-current">₹{{ item.discountPrice }}</span>
            <span class="price-original" *ngIf="+item.offer > 0">₹{{ item.price }}</span>
          </div>

          <div class="card-actions">
            <p-button label="View Product" icon="pi pi-eye" severity="success" styleClass="view-btn"
              (onClick)="goToProduct(item.productId!)" />
          </div>
        </div>

      </div>
    </div>

    <!-- LOADER -->
    <div class="wl-loader" *ngIf="loading">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <!-- ALL LOADED -->
    <div class="all-loaded" *ngIf="!loading && page >= totalPages && wishlist.length > 0">
      <span class="line"></span>
      <span class="text"><i class="pi pi-check-circle"></i> All items loaded</span>
      <span class="line"></span>
    </div>

  </div>
</div>
