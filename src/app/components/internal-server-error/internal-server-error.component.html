<div class="error-page">

    <!-- BG CIRCLES -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>

    <div class="error-card">

        <!-- ICON -->
        <div class="error-icon-wrap">
            <div class="error-icon">
                <i class="pi pi-server"></i>
            </div>
            <div class="pulse-ring"></div>
        </div>

        <!-- CODE -->
        <div class="error-code">500</div>

        <!-- TEXT -->
        <h1>Internal Server Error</h1>
        <p>Something went wrong on our end. Our technical team has been notified and is working on a fix. Please try
            again in a little while.</p>

        <!-- WHAT HAPPENED -->
        <div class="info-strip">
            <div class="info-item">
                <i class="pi pi-bell"></i>
                <span>Team notified</span>
            </div>
            <div class="info-divider"></div>
            <div class="info-item">
                <i class="pi pi-wrench"></i>
                <span>Fix in progress</span>
            </div>
            <div class="info-divider"></div>
            <div class="info-item">
                <i class="pi pi-clock"></i>
                <span>Try again soon</span>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="error-actions">
            <p-button label="Go to Home" icon="pi pi-home" severity="success" routerLink="/home" />
            <p-button label="Try Again" icon="pi pi-refresh" [outlined]="true" severity="success"
                (onClick)="reload()" />
        </div>

    </div>

</div>
