<footer class="footer">
    <div class="footer-container">
        <div class="quick-links">
            <h3>Quick Links</h3>
            <ul>
                <li><a routerLink="/about">About Us</a></li>
                <li><a routerLink="/products">Products</a></li>
                <!-- <li><a routerLink="/about">Contact</a></li> -->
                <!-- <li><a routerLink="/faq">FAQs</a></li> -->
                <li><a routerLink="/terms">Terms & Conditions</a></li>
                <li><a routerLink="/shipping-returns">Shipping & Returns</a></li>
                <li><a routerLink="/privacy-policy">Privacy Policy</a></li>
            </ul>
        </div>

        <div class="get-in-touch">
            <h3>Get in Touch</h3>
            <div class="social-icons">
                <a href="https://www.facebook.com" target="_blank"><i class="pi pi-facebook"></i></a>
                <a href="https://wa.me/your-number" target="_blank"><i class="pi pi-whatsapp"></i></a>
                <a href="https://www.instagram.com" target="_blank"><i class="pi pi-instagram"></i></a>
                <a href="tel:+1234567890"><i class="pi pi-phone"></i></a>
                <a href="mailto:info@example.com"><i class="pi pi-envelope"></i></a>
                <a href="https://twitter.com" target="_blank"><i class="pi pi-twitter"></i></a>
                <a href="https://discord.com" target="_blank"><i class="pi pi-discord"></i></a>
                <a href="https://t.me/your-telegram" target="_blank"><i class="pi pi-telegram"></i></a>
            </div>
        </div>

        <div *ngIf="false" class="footer-cover w-full flex justify-content-center align-items-center flex-column">
            <h2>Get Exclusive Offers</h2>

            <div class="subscription-wrapper w-full flex justify-content-center">
                <input class="mail-input-field" type="email" placeholder="Enter your email">
                <button class="subscription-btn">Subscribe</button>
            </div>
        </div>

        <hr class="copyrights-divider">
        <div class="copyrights-wrapper">
            <p class="copyright">{{copyrightText}}</p>
        </div>
    </div>
</footer>
